<article>
  <a [routerLink]="['/details', movieOrSerie.media_type, movieOrSerie.id]">
    <p-card styleClass="w-auto overflow-hidden ">
      <img
        [alt]="movieOrSerie.name"
        class="w-full"
        [src]="['https://image.tmdb.org/t/p/w500' + movieOrSerie.poster_path]"
      />
    </p-card>
  </a>
</article>
